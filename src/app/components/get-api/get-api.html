<div class="max-w-6xl mx-auto p-4">
  <div class="overflow-x-auto bg-white shadow-lg rounded-xl border border-gray-100">
    <table class="min-w-full text-sm text-left text-gray-600">
      <thead class="bg-gray-50 text-gray-700 uppercase text-xs tracking-wider">
        <tr>
          <th class="px-6 py-4">UserID</th>
          <th class="px-6 py-4">ID</th>
          <th class="px-6 py-4">Title</th>
          <th class="px-6 py-4">Completed</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-gray-100">
        @if (todoList.length === 0) {
          <tr>
            <td colspan="4" class="px-6 py-4 text-center text-gray-500">
              Chargement des données...
            </td>
          </tr>
        } @else {
          @for (todo of todoList; track todo.id) {
          <tr class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 font-medium text-gray-800">
              {{ todo.userId }}
            </td>

            <td class="px-6 py-4">
              {{ todo.id }}
            </td>

            <td class="px-6 py-4 max-w-md truncate">
              {{ todo.title }}
            </td>

            <td class="px-6 py-4">
              <!-- @if (todo.completed) {
                <span class="px-2 py-1 text-xs font-semibold text-green-700 bg-green-100 rounded-full">
                  Yes
                </span>
              } @else {
                <span class="px-2 py-1 text-xs font-semibold text-red-700 bg-red-100 rounded-full">
                  No
                </span>
              } -->

              <div
                class="inline-block"
                [ngClass]="
                  todo.completed
                    ? 'px-2 py-0.5 text-xs font-semibold text-green-700 bg-green-100 rounded-full'
                    : 'px-2 py-0.5 text-xs font-semibold text-red-700 bg-red-100 rounded-full'
                "
              >
                {{ todo.completed ? 'Yes' : 'No' }}
              </div>
            </td>
          </tr>
        }
        }
      </tbody>
    </table>
  </div>
</div>
